name: Build

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x 
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SQLite migration and seed
        run: npm run migrate:sqlite-seed

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
