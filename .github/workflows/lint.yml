name: Lint

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '*'

jobs:
  lint:
    runs-on: ubuntu-latest

    env: # inject dummy safe env values
      NEXTAUTH_SECRET: "devsecretdevsecretdevsecretdevse" # must be >=32 chars
      NEXTAUTH_URL: "http://localhost:4001"
      KEYCLOAK_DOMAIN: "http://localhost:8080"
      
      KEYCLOAK_END_SESSION_URL: "dummy"
      KEYCLOAK_JWKS_URI: "dummy"
      CENTRAL_RESOURCES_FOLDER_ID: "dummy"
      GOOGLE_SERVICE_ACCOUNT_EMAIL: "dummy@example.com"
      GOOGLE_PRIVATE_KEY: "dummy"
      GITLAB_ISSUES_REPORTING_TOKEN: "dummy"
      GITLAB_REPORTING_PROJECT_ID: "12345"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 22.x (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: 22.x 
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint