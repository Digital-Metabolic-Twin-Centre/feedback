services:
  postgres:
    image: postgres:15
    container_name: imdhub-postgres
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  nextjs:
    image: sbgroup/imdhub:latest
    container_name: imdhub-nextjs
    env_file:
      - .env
    ports:
      - "3003:3000"
    volumes:
      - uploads_data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  pgdata:
  uploads_data:
    name: ${UPLOADS_VOLUME}
