services:
  feedback:
    image: ghcr.io/digital-metabolic-twin-centre/feedback:latest
    container_name: dmtc-feedback

    env_file:
      - .env

    expose:
      - "4001"

    # Persistent feedback storage shared via host mount
    volumes:
      - /opt/dmtc_production/feedback:/app/data

    restart: always

    # suggested resource limits for production deployment, adjust as needed
    mem_limit: 128m
    mem_reservation: 64m
    cpus: 0.2